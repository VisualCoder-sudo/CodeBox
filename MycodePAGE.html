<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My code</title>
    <link rel="stylesheet" href="MyCodePage.css?v=1.1">
    <script src="FileSaving.js"></script>
</head>
<body>

<div class="container">
    <h2 style="color: rgb(255, 255, 255);">My code</h2>
    
    <div class="box">
        <input type="text" id="nameInput" placeholder="Text/Code name" style="width:100%; box-sizing:border-box; margin-bottom:10px;">
        <textarea id="userInput" rows="5" placeholder="Paste Text/Code here"></textarea>
        <div class="row">
            <input type="text" id="categoryInput" placeholder="Category">
            <input type="color" id="colorInput" value="#9b59b6">
            <button class="btn btn-save" onclick="saveData()">Upload</button>
        </div>
    </div>

    <div class="box" style="background: #3d3d3d;">
        <strong style="color: white;">Manage Data:</strong>
        <div class="row" style="margin-top:10px;">
            <button class="btn btn-export" onclick="exportToJSON()">Download all (.json)</button>
            <button class="btn btn-import">
                Restore From (.json)
                <input type="file" id="importFile" style="position:absolute; left:0; top:0; opacity:0; cursor:pointer;" onchange="importFromJSON(this)">
            </button>
            <button class="btn" style="background:#6c757d; color:white;" onclick="clearVault()">Clear All Data</button>
        </div>
    </div>

    <div class="box">
        <div class="row">
            <input type="text" id="searchBar" placeholder="Search by name or contents" oninput="renderList()">
            <select id="categoryFilter" onchange="renderList()"></select>
        </div>
    </div>

    <ul id="storageList"></ul>
</div>
</body>
</html>
